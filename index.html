<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Trainingslog</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; padding: 1rem; max-width: 480px; margin: 0 auto; }
h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
.subtitle { font-size: 13px; color: #666; margin-bottom: 1.25rem; }
.day-tabs { display: flex; gap: 8px; margin-bottom: 1rem; }
.tab { flex: 1; padding: 10px 0; font-size: 14px; font-weight: 500; border: 1px solid #ddd; border-radius: 10px; background: #fff; color: #555; cursor: pointer; -webkit-tap-highlight-color: transparent; }
.tab.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
.date-row { margin-bottom: 1rem; }
.date-row input[type=date] { width: 100%; padding: 10px 12px; font-size: 14px; border: 1px solid #ddd; border-radius: 10px; background: #fff; color: #1a1a1a; -webkit-appearance: none; }
.section-label { font-size: 11px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: #999; margin: 1.25rem 0 0.5rem; }
.exercise-card { background: #fff; border: 1px solid #eee; border-radius: 14px; padding: 1rem 1.1rem; margin-bottom: 10px; }
.ex-name { font-size: 14px; font-weight: 600; color: #1a1a1a; margin-bottom: 5px; }
.ex-note { font-size: 12px; color: #777; margin-bottom: 10px; line-height: 1.5; }
.fields { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.field label { display: block; font-size: 11px; color: #888; margin-bottom: 4px; }
.field input { width: 100%; padding: 9px 10px; font-size: 15px; border: 1px solid #ddd; border-radius: 8px; background: #fafafa; color: #1a1a1a; -webkit-appearance: none; }
.field input:focus { outline: none; border-color: #1a1a1a; background: #fff; }
.prev { font-size: 11px; color: #aaa; margin-top: 7px; text-align: right; }
.prev span { color: #666; }
.finisher-card { background: #f0f0f0; border: 1px solid #e0e0e0; border-radius: 14px; padding: 1rem 1.1rem; margin-bottom: 10px; }
.finisher-card .ex-name { font-size: 13px; color: #666; font-weight: 400; }
.save-btn { width: 100%; margin-top: 1.5rem; margin-bottom: 2rem; padding: 14px; font-size: 16px; font-weight: 600; border: none; border-radius: 14px; background: #1a1a1a; color: #fff; cursor: pointer; -webkit-tap-highlight-color: transparent; }
.save-btn:active { opacity: 0.75; }
.toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); background: #1a1a1a; color: #fff; padding: 11px 22px; border-radius: 20px; font-size: 14px; opacity: 0; transition: opacity 0.2s; pointer-events: none; white-space: nowrap; z-index: 99; }
.toast.show { opacity: 1; }
</style>
</head>
<body>

<h1>Trainingslog</h1>
<p class="subtitle">Gewicht · sets · reps bijhouden per sessie</p>

<div class="day-tabs">
  <button class="tab active" onclick="switchDay('A')">Dag A</button>
  <button class="tab" onclick="switchDay('B')">Dag B</button>
  <button class="tab" onclick="switchDay('C')">Dag C</button>
</div>

<div class="date-row">
  <input type="date" id="session-date" />
</div>

<div id="exercise-list"></div>
<button class="save-btn" onclick="saveSession()">Sessie opslaan</button>

<div class="toast" id="toast"></div>

<script>
var schema = {
  A: {
    sections: [
      { label: "Benen & billen", exercises: [
        { id: "slp", name: "Single leg press", note: "3 × 8–10 p. been · Één been tegelijk, voet midden op platform" },
        { id: "hip_a", name: "Hip thrust", note: "3 × 8–10 · Rug op bankje, bekken neutraal aan de top" },
        { id: "llc", name: "Lying leg curl", note: "3 × 12–15 · Hamstrings, volledige rugontlasting" }
      ]},
      { label: "Bovenlichaam", exercises: [
        { id: "row_a", name: "Seated machine row", note: "3 × 8–10 · Schouderbladen samentrekken aan het einde" },
        { id: "sp_a", name: "Dumbbell shoulder press (zittend)", note: "3 × 8–10 · Zittend voor stabielere rugpositie" }
      ]},
      { label: "Armen", exercises: [
        { id: "curl_a", name: "Dumbbell bicep curl (zittend)", note: "3 × 12 · Ellebogen gefixeerd, gecontroleerd neer" },
        { id: "incline_curl", name: "Incline dumbbell curl ✦", note: "3 × 12 · Optioneel · Bank op 45–60°" }
      ]}
    ],
    finisher: null
  },
  B: {
    sections: [
      { label: "Benen & billen", exercises: [
        { id: "lp_b", name: "Leg press (voeten hoog & breed)", note: "3 × 8–10 · Hoge glute- en hamstringactivatie" },
        { id: "abd", name: "Hip abductie + adductie (superset)", note: "3 × 12–15 p. oef. · Direct achter elkaar" }
      ]},
      { label: "Bovenlichaam", exercises: [
        { id: "inc_press", name: "Incline dumbbell press (30–45°)", note: "3 × 8–10 · Schoudervriendelijker dan vlak bankje" },
        { id: "fly_b", name: "Chest fly machine", note: "3 × 12–15 · Gecontroleerde stretch" }
      ]},
      { label: "Armen", exercises: [
        { id: "tri_b", name: "Tricep pushdown (machine of touw)", note: "3 × 12 · Ellebogen gefixeerd" },
        { id: "legext_b", name: "Leg extension machine ✦", note: "3 × 12–15 · Optioneel · Licht gewicht, gecontroleerd" }
      ]}
    ],
    finisher: null
  },
  C: {
    sections: [
      { label: "Benen & billen", exercises: [
        { id: "bss", name: "Bulgarian split squat", note: "3 × 8–10 p. been · Eerste 2 weken zonder gewicht" },
        { id: "slc", name: "Seated leg curl", note: "3 × 12–15 · Zwaarder dan lying leg curl dag A" },
        { id: "super_c", name: "Leg extension + calf raise (superset)", note: "3 × superset · 12 leg ext. direct gevolgd door 15 calf raise" }
      ]},
      { label: "Bovenlichaam", exercises: [
        { id: "pull_c", name: "Lat pulldown (smalle neutrale greep)", note: "3 × 8–10 · V-stang, groter bewegingsbereik" },
        { id: "lat_c", name: "Dumbbell lateral raise", note: "3 × 12–15 · Zittend, armen tot schouderhoogte" }
      ]},
      { label: "Armen", exercises: [
        { id: "super_arm", name: "Bicep curl + tricep pushdown (superset)", note: "3 × 12 p. oef. · Direct achter elkaar" }
      ]}
    ],
    finisher: { name: "Sled push · 3–4 × 25 m · 60–90 sec rust · Eerste 2 weken zonder extra gewicht" }
  }
};

var currentDay = 'A';

function switchDay(day) {
  currentDay = day;
  var tabs = document.querySelectorAll('.tab');
  var days = ['A','B','C'];
  for (var i = 0; i < tabs.length; i++) {
    tabs[i].classList.toggle('active', days[i] === day);
  }
  render();
}

function storageKey(day, id, date) { return 'tr_' + day + '_' + id + '_' + date; }

function getPrev(day, id, date) {
  var dates = [];
  try {
    var prefix = 'tr_' + day + '_' + id + '_';
    for (var i = 0; i < localStorage.length; i++) {
      var k = localStorage.key(i);
      if (k && k.indexOf(prefix) === 0) {
        var d = k.slice(prefix.length);
        if (d < date) dates.push(d);
      }
    }
  } catch(e) { return null; }
  if (!dates.length) return null;
  dates.sort();
  try {
    var raw = localStorage.getItem('tr_' + day + '_' + id + '_' + dates[dates.length - 1]);
    return raw ? JSON.parse(raw) : null;
  } catch(e) { return null; }
}

function getSaved(day, id, date) {
  if (!date) return null;
  try {
    var raw = localStorage.getItem(storageKey(day, id, date));
    return raw ? JSON.parse(raw) : null;
  } catch(e) { return null; }
}

function render() {
  var date = document.getElementById('session-date').value;
  var day = schema[currentDay];
  var html = '';
  for (var s = 0; s < day.sections.length; s++) {
    var sec = day.sections[s];
    html += '<div class="section-label">' + sec.label + '</div>';
    for (var e = 0; e < sec.exercises.length; e++) {
      var ex = sec.exercises[e];
      var saved = getSaved(currentDay, ex.id, date);
      var prev = date ? getPrev(currentDay, ex.id, date) : null;
      html += '<div class="exercise-card">';
      html += '<div class="ex-name">' + ex.name + '</div>';
      if (ex.note) html += '<div class="ex-note">' + ex.note + '</div>';
      html += '<div class="fields">';
      html += '<div class="field"><label>Gewicht (kg)</label><input type="number" step="0.5" min="0" inputmode="decimal" placeholder="—" id="w_' + ex.id + '" value="' + (saved ? saved.w : '') + '"></div>';
      html += '<div class="field"><label>Sets</label><input type="number" min="1" inputmode="numeric" placeholder="3" id="s_' + ex.id + '" value="' + (saved ? saved.s : '') + '"></div>';
      html += '<div class="field"><label>Reps</label><input type="number" min="1" inputmode="numeric" placeholder="10" id="r_' + ex.id + '" value="' + (saved ? saved.r : '') + '"></div>';
      html += '</div>';
      if (prev) html += '<div class="prev">Vorige: <span>' + (prev.w||0) + ' kg · ' + (prev.s||0) + ' sets · ' + (prev.r||0) + ' reps</span></div>';
      html += '</div>';
    }
  }
  if (day.finisher) {
    html += '<div class="section-label">Finisher</div>';
    html += '<div class="finisher-card"><div class="ex-name">' + day.finisher.name + '</div></div>';
  }
  document.getElementById('exercise-list').innerHTML = html;
}

function saveSession() {
  var date = document.getElementById('session-date').value;
  if (!date) { showToast('Kies eerst een datum'); return; }
  var day = schema[currentDay];
  for (var s = 0; s < day.sections.length; s++) {
    var sec = day.sections[s];
    for (var e = 0; e < sec.exercises.length; e++) {
      var ex = sec.exercises[e];
      var wEl = document.getElementById('w_' + ex.id);
      var sEl = document.getElementById('s_' + ex.id);
      var rEl = document.getElementById('r_' + ex.id);
      var w = wEl ? wEl.value : '';
      var sv = sEl ? sEl.value : '';
      var r = rEl ? rEl.value : '';
      if (w || sv || r) {
        try { localStorage.setItem(storageKey(currentDay, ex.id, date), JSON.stringify({ w: w||0, s: sv||0, r: r||0 })); } catch(e) {}
      }
    }
  }
  showToast('Opgeslagen \u2713');
  render();
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2000);
}

function getToday() {
  var d = new Date();
  var m = d.getMonth() + 1;
  var day = d.getDate();
  return d.getFullYear() + '-' + (m < 10 ? '0' + m : m) + '-' + (day < 10 ? '0' + day : day);
}

window.onload = function() {
  document.getElementById('session-date').value = getToday();
  document.getElementById('session-date').addEventListener('change', render);
  render();
};
</script>
</body>
</html>
